name: Generate AI Draft

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. These run at 09:00, 13:00, 17:00, and 21:00 KST.
    - cron: "0 0,4,8,12 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-draft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install thumbnail renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice fonts-noto-cjk

      - name: Generate AI draft
        id: draft
        run: npm run generate:post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: add AI generated draft"
          title: "AI generated tech blog draft"
          base: ${{ github.event.repository.default_branch }}
          body: |
            AI가 생성한 기술 블로그 초안입니다.

            작성된 글:
            - 제목: ${{ steps.draft.outputs.title }}
            - 주제: ${{ steps.draft.outputs.topic }}
            - 요약: ${{ steps.draft.outputs.summary }}
            - slug: ${{ steps.draft.outputs.slug }}
            - 초안 파일: ${{ steps.draft.outputs.draft_path }}

            검수 항목:
            - 기술적으로 틀린 내용이 없는지 확인
            - 코드 예제가 실제로 동작하는지 확인
            - 관련 이미지 주제 2건이 글 내용과 맞는지 확인
            - 제목과 카테고리가 적절한지 확인
            - 파일명과 slug가 영어 kebab-case인지 확인
            - 필요하면 _drafts에서 _posts로 이동 후 발행
          branch: ai/generated-tech-draft-${{ github.run_id }}
          delete-branch: true
