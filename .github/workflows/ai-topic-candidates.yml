name: Generate AI Topic Candidates

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of topic candidates"
        required: false
        default: "10"
  schedule:
    # GitHub Actions cron uses UTC. These run at 09:00, 13:00, 17:00, and 21:00 KST.
    - cron: "0 0,4,8,12 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-topic-candidates-tech-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-candidates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate topic candidates
        id: candidates
        run: npm run generate:topic-candidates -- --count "${{ inputs.count || '10' }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: add AI topic candidates"
          title: ${{ steps.candidates.outputs.title }}
          base: ${{ github.event.repository.default_branch }}
          body-path: ${{ steps.candidates.outputs.body_file }}
          branch: ai/topic-candidates-tech-${{ github.run_id }}
          delete-branch: true
