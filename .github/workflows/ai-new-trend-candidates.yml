name: Generate AI New Trend Candidates

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of new trend candidates"
        required: false
        default: "5"
  schedule:
    # GitHub Actions cron uses UTC. These run at 09:00, 13:00, 17:00, and 21:00 KST.
    - cron: "0 0,4,8,12 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-new-trend-candidates-tech-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-candidates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate new trend candidates
        id: candidates
        run: npm run generate:new-trend-candidates -- --count "${{ inputs.count || '5' }}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: add AI new trend candidates"
          title: ${{ steps.candidates.outputs.title }}
          base: ${{ github.event.repository.default_branch }}
          body-path: ${{ steps.candidates.outputs.body_file }}
          branch: ai/new-trend-candidates-tech-${{ github.run_id }}
          delete-branch: true
